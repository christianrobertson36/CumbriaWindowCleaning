name: Build Cumbria Window Cleaning images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  API_TAG: v1
  WEB_TAG: v1

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/christianrobertson36/cumbria-window-cleaning-api:${{ env.API_TAG }}

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=http://localhost:5055
          tags: ghcr.io/christianrobertson36/cumbria-window-cleaning-web:${{ env.WEB_TAG }}
